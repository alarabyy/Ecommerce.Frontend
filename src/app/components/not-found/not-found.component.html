<div class="not-found-container">
  <div class="not-found-content">
    <!-- 404 Image -->
    <div class="error-image">
      <img src="/Images/404.png" alt="404 Page Not Found" class="not-found-img">
    </div>

    <!-- Error Text -->
    <div class="error-text">
      <h1 class="error-title">Page not found</h1>
      <p class="error-description">The page you want to go is not currently available</p>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn btn-primary" (click)="goHome()">Home Page</button>
      <button class="btn btn-secondary" (click)="goBack()">Back</button>
    </div>
  </div>
</div>
