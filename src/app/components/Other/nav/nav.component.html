<!-- ============================== -->
<!-- =   MOBILE MENU & OVERLAY    = -->
<!-- ============================== -->
<div class="mobile-menu-overlay" [class.open]="isMobileMenuOpen" (click)="toggleMobileMenu()"></div>

<nav class="mobile-menu" [class.open]="isMobileMenuOpen">
  <!-- رأس القائمة -->
  <div class="mobile-menu-header">
    <a routerLink="/" class="logo-text" (click)="toggleMobileMenu()">Matgarak</a>
    <button class="close-btn" (click)="toggleMobileMenu()" aria-label="Close menu">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <!-- جسم القائمة (قابل للتمرير) -->
  <div class="mobile-menu-body">
    <!-- البحث في الهاتف -->
    <div class="mobile-menu-search">
      <input type="text" placeholder="Search for anything...">
      <button type="button" aria-label="Search"><i class="fas fa-search"></i></button>
    </div>

    <!-- روابط التنقل الرئيسية -->
    <div class="mobile-menu-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="toggleMobileMenu()">Home</a>
      <a routerLink="/shop" routerLinkActive="active" (click)="toggleMobileMenu()">Shop</a>
      <a routerLink="/fruits-vegetables" routerLinkActive="active" (click)="toggleMobileMenu()">Fruits & Vegetables</a>
      <a routerLink="/blog" routerLinkActive="active" (click)="toggleMobileMenu()">Blog</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="toggleMobileMenu()">Contact</a>
      <hr>
      <a routerLink="/account" routerLinkActive="active" (click)="toggleMobileMenu()">My Account</a>
      <a routerLink="/wishlist" routerLinkActive="active" (click)="toggleMobileMenu()">Wishlist</a>
      <a routerLink="/about" routerLinkActive="active" (click)="toggleMobileMenu()">About Us</a>
    </div>
  </div>

  <!-- تذييل القائمة (ثابت) -->
  <div class="mobile-menu-footer">
    <div class="mobile-locale-options">
      <a href="#">English <i class="fas fa-chevron-down"></i></a>
      <a href="#">USD <i class="fas fa-chevron-down"></i></a>
    </div>
    <button (click)="toggleTheme()" class="theme-toggle" title="Toggle Theme" aria-label="Toggle color theme">
      <i class="fas" [class.fa-sun]="isDarkMode" [class.fa-moon]="!isDarkMode"></i>
      <span>{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
    </button>
  </div>
</nav>


<!-- ============================== -->
<!-- =       MAIN HEADER          = -->
<!-- ============================== -->
<header class="main-header">
  <!-- الشريط العلوي -->
  <div class="top-bar">
    <div class="container top-bar-content">
      <div class="top-links">
        <a routerLink="/about">About Us</a>
        <a routerLink="/account">My Account</a>
        <a routerLink="/wishlist">Wishlist</a>
      </div>
      <div class="delivery-info">
        <span>We deliver from <strong>7:00 to 20:00</strong></span>
      </div>
      <div class="locale-options">
        <a href="#">English <i class="fas fa-chevron-down"></i></a>
        <a href="#">USD <i class="fas fa-chevron-down"></i></a>
        <button (click)="toggleTheme()" class="theme-toggle" title="Toggle Theme" aria-label="Toggle color theme">
          <i class="fas" [class.fa-sun]="isDarkMode" [class.fa-moon]="!isDarkMode"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- الشريط الأوسط -->
  <div class="middle-bar">
    <div class="container middle-bar-content">
      <button class="hamburger-menu" (click)="toggleMobileMenu()" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </button>

      <a routerLink="/" class="logo-link">
        <span class="logo-text">Matgarak</span>
      </a>

      <div class="search-section">
        <input type="text" placeholder="I'm searching for products, categories, or brands...">
        <button type="button" aria-label="Search"><i class="fas fa-search"></i></button>
      </div>

      <div class="user-actions">
        <a routerLink="/account" class="action-item" title="Account">
          <i class="fas fa-user"></i>
          <span class="action-text">Account</span>
        </a>
        <a routerLink="/wishlist" class="action-item" title="Wishlist">
          <span class="notification-badge">3</span>
          <i class="fas fa-heart"></i>
          <span class="action-text">Wishlist</span>
        </a>
        <a routerLink="/cart" class="action-item cart-item" title="Cart">
          <span class="notification-badge">1</span>
          <i class="fas fa-shopping-cart"></i>
          <span class="action-text">Cart</span>
        </a>
      </div>
    </div>
  </div>

  <!-- الشريط السفلي -->
  <nav class="bottom-bar">
    <div class="container bottom-bar-content">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/shop" routerLinkActive="active">Shop <i class="fas fa-chevron-down"></i></a>
      <a routerLink="/fruits-vegetables" routerLinkActive="active">Fruits & Vegetables</a>
      <a routerLink="/blog" routerLinkActive="active">Blog</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
      <a href="#" class="promo-link">
        <i class="fas fa-tag"></i> Special Offers
      </a>
    </div>
  </nav>

</header>
